name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality:
    name: Quality Gate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  smoke-e2e:
    name: Smoke E2E
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Build
        run: npm run build

      - name: Start app on port 3006
        run: |
          npm run start -- --hostname 127.0.0.1 --port 3006 > next-server.log 2>&1 &
          echo $! > next-server.pid

          for i in {1..60}; do
            if curl -fsS http://127.0.0.1:3006 >/dev/null; then
              exit 0
            fi

            sleep 2
          done

          cat next-server.log
          exit 1

      - name: MVP smoke
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test:mvp

      - name: Review regressions
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test:review

      - name: Pack preview
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test:packs

      - name: World-class UX acceptance
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test -- tests/world-class-ux-acceptance.spec.ts --workers=1

      - name: UX-E automated evidence proxy
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test -- tests/ux-e-automated-evidence.spec.ts --workers=1

      - name: Track B accessibility release gate
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test -- tests/track-b-accessibility-release-gate.spec.ts --workers=1

      - name: Track B performance budget
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test -- tests/track-b-performance-budget.spec.ts --workers=1

      - name: Track B review reliability gate
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test -- tests/track-b-review-reliability.spec.ts --workers=1

      - name: Track B analytics retention gate
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test -- tests/analytics-events.spec.ts tests/track-b-analytics-retention-core.spec.ts tests/track-b-analytics-retention-gate.spec.ts --workers=1

      - name: Full regression suite
        env:
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3006
        run: npm run test:regression:functional

      - name: Stop app
        if: always()
        run: |
          if [ -f next-server.pid ]; then
            kill "$(cat next-server.pid)" || true
          fi

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Upload server log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: next-server-log
          path: next-server.log
          if-no-files-found: ignore

  account-persistence-postgres:
    name: Account Persistence PostgreSQL Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vlx_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vlx_integration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: vlx_integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Account persistence contract
        run: npm run test -- tests/account-owned-learning-persistence-pr-a.spec.ts --workers=1

      - name: Read-only staging activation contract
        run: npm run test -- tests/account-owned-learning-persistence-pr-b.spec.ts --workers=1

      - name: Ensure PostgreSQL client
        run: |
          if ! command -v psql >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
          psql --version

      - name: PostgreSQL RLS, integrity, and owned rollback
        run: |
          psql -v ON_ERROR_STOP=1 \
            -f tests/postgres/account-owned-learning-persistence/000_bootstrap.sql

          PGOPTIONS="-c vlx.account_persistence_target=staging" \
            psql -v ON_ERROR_STOP=1 \
              -f src/lib/account-persistence/supabase-staging/sql/001_account_learning_evidence_up.sql \
              -f tests/postgres/account-owned-learning-persistence/010_rls_and_integrity_assertions.sql \
              -f src/lib/account-persistence/supabase-staging/sql/001_account_learning_evidence_down.sql \
              -f tests/postgres/account-owned-learning-persistence/020_rollback_assertions.sql

      - name: PostgreSQL collision fails closed
        run: |
          psql -v ON_ERROR_STOP=1 \
            -f tests/postgres/account-owned-learning-persistence/030_collision_setup.sql

          if PGOPTIONS="-c vlx.account_persistence_target=staging" \
            psql -v ON_ERROR_STOP=1 \
              -f src/lib/account-persistence/supabase-staging/sql/001_account_learning_evidence_up.sql; then
            echo "Migration unexpectedly replaced a colliding object."
            exit 1
          fi

          psql -v ON_ERROR_STOP=1 \
            -f tests/postgres/account-owned-learning-persistence/040_collision_assertions.sql

  visual-screenshots:
    name: Visual Screenshot Parity
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install chromium

      - name: Run Figma parity screenshots
        run: npm run test -- tests/figma-parity-screenshots.spec.ts --workers=1

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: visual-playwright-report
          path: |
            playwright-report/
            test-results/
          if-no-files-found: ignore

  account-persistence-pr-c-postgres:
    name: Account Persistence PR C PostgreSQL Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vlx_pr_c_integration
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vlx_pr_c_integration"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: vlx_pr_c_integration

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: PR C staging apply and browser hydration contracts
        run: npm run test:account-learning:pr-c

      - name: PR C historical scope and safety guards
        run: npm run test:account-learning:pr-c:guards

      - name: Ensure PostgreSQL client
        run: |
          if ! command -v psql >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
          psql --version

      - name: PostgreSQL PR C apply, RLS, replay, and operational rollback
        run: |
          psql -v ON_ERROR_STOP=1 \
            -f tests/postgres/account-owned-learning-persistence/000_bootstrap.sql

          PGOPTIONS="-c vlx.account_persistence_target=staging" \
            psql -v ON_ERROR_STOP=1 \
              -f src/lib/account-persistence/supabase-staging/sql/001_account_learning_evidence_up.sql \
              -f src/lib/account-persistence/supabase-staging/sql/002_account_learning_apply_up.sql \
              -f src/lib/account-persistence/supabase-staging/sql/003_account_learning_auth_rls_initplan_up.sql \
              -f src/lib/account-persistence/supabase-staging/sql/004_account_learning_hosted_grantor_compat_up.sql \
              -f tests/postgres/account-owned-learning-persistence/050_pr_c_default_disabled_assertions.sql \
              -f tests/postgres/account-owned-learning-persistence/055_pr_c_auth_rls_initplan_assertions.sql \
              -f tests/postgres/account-owned-learning-persistence/060_pr_c_apply_assertions.sql \
              -f tests/postgres/account-owned-learning-persistence/070_pr_c_operational_rollback_assertions.sql

          PGOPTIONS="-c vlx.account_persistence_target=staging -c vlx.account_persistence_disposable_test=true" \
            psql -v ON_ERROR_STOP=1 \
              -f tests/postgres/account-owned-learning-persistence/080_pr_c_disposable_teardown.sql \
              -f tests/postgres/account-owned-learning-persistence/090_pr_c_disposable_teardown_assertions.sql \
              -f src/lib/account-persistence/supabase-staging/sql/001_account_learning_evidence_down.sql \
              -f tests/postgres/account-owned-learning-persistence/020_rollback_assertions.sql

  account-persistence-pr-c-hosted-operator:
    name: Account Persistence Hosted Operator PostgreSQL 17 Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: vlx_bootstrap
          POSTGRES_PASSWORD: vlx_bootstrap
          POSTGRES_DB: vlx_pr_c_hosted_operator
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vlx_bootstrap -d vlx_pr_c_hosted_operator"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: vlx_pr_c_hosted_operator

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure PostgreSQL client
        run: |
          if ! command -v psql >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
          psql --version

      - name: Bootstrap split hosted roles and auth ownership
        env:
          PGUSER: vlx_bootstrap
          PGPASSWORD: vlx_bootstrap
        run: >-
          psql -v ON_ERROR_STOP=1
          -f tests/postgres/account-owned-learning-persistence/hosted-operator/000_bootstrap.sql

      - name: Reproduce non-delegable hosted auth privileges
        run: >-
          psql -v ON_ERROR_STOP=1
          -f tests/postgres/account-owned-learning-persistence/hosted-operator/010_operator_preflight.sql

      - name: PostgreSQL hosted migrations and live wrapper ACL repair
        run: |
          PGOPTIONS="-c vlx.account_persistence_target=staging" \
            psql -v ON_ERROR_STOP=1 \
              -f src/lib/account-persistence/supabase-staging/sql/001_account_learning_evidence_up.sql \
              -f src/lib/account-persistence/supabase-staging/sql/002_account_learning_apply_up.sql \
              -f src/lib/account-persistence/supabase-staging/sql/003_account_learning_auth_rls_initplan_up.sql \
              -f tests/postgres/account-owned-learning-persistence/hosted-operator/015_wrapper_prestate.sql \
              -f src/lib/account-persistence/supabase-staging/sql/004_account_learning_hosted_grantor_compat_up.sql

      - name: PostgreSQL wrong operator fails closed
        env:
          PGUSER: vlx_wrong_operator
          PGPASSWORD: vlx_wrong_operator
        run: |
          psql -v ON_ERROR_STOP=1 \
            -f tests/postgres/account-owned-learning-persistence/hosted-operator/012_wrong_operator_session.sql

          if PGOPTIONS="-c vlx.account_persistence_target=staging -c vlx.account_persistence_pr_c_write_capability_digest=sha256:89228d479955b4faa37880d337d82301a3d5e1333a6445f283f3bed844c8d518 -c vlx.account_persistence_pr_c_deployment_sha=1111111111111111111111111111111111111111 -c vlx.account_persistence_pr_c_approved_owner_account_id=6f3a6f4e-a0c8-4c6e-8e62-94cb1c922b6b" \
            psql -v ON_ERROR_STOP=1 \
              -f src/lib/account-persistence/supabase-staging/sql/002_account_learning_apply_enable.sql \
              > wrong-operator-enable.log 2>&1; then
            echo "Enable unexpectedly accepted the wrong database operator."
            exit 1
          fi

          if ! grep -Fq -- \
            "VLX account learning apply activation requires the postgres operator" \
            wrong-operator-enable.log; then
            cat wrong-operator-enable.log
            exit 1
          fi

          if PGOPTIONS="-c vlx.account_persistence_target=staging" \
            psql -v ON_ERROR_STOP=1 \
              -f src/lib/account-persistence/supabase-staging/sql/002_account_learning_apply_operational_rollback.sql \
              > wrong-operator-rollback.log 2>&1; then
            echo "Rollback unexpectedly accepted the wrong database operator."
            exit 1
          fi

          if ! grep -Fq -- \
            "VLX account learning apply rollback requires the postgres operator" \
            wrong-operator-rollback.log; then
            cat wrong-operator-rollback.log
            exit 1
          fi

      - name: PostgreSQL hosted apply, replay, conflict, and rollback
        run: |
          PGOPTIONS="-c vlx.account_persistence_target=staging" \
            psql -v ON_ERROR_STOP=1 \
              -f tests/postgres/account-owned-learning-persistence/hosted-operator/020_migration_preflight.sql \
              -f tests/postgres/account-owned-learning-persistence/hosted-operator/030_apply_assertions.sql \
              -f tests/postgres/account-owned-learning-persistence/hosted-operator/040_rollback_assertions.sql

  account-persistence-pr-c-concurrency:
    name: Account Persistence PostgreSQL Concurrency Gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: vlx_pr_c_concurrency
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d vlx_pr_c_concurrency"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: vlx_pr_c_concurrency

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure PostgreSQL client
        run: |
          if ! command -v psql >/dev/null; then
            sudo apt-get update
            sudo apt-get install -y postgresql-client
          fi
          psql --version

      - name: PostgreSQL PR C concurrency and rollback serialization
        run: tests/postgres/account-owned-learning-persistence/concurrency/run.sh
